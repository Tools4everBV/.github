############################## 
# Workflow: Create Release 
# Version: 0.0.7 
##############################
name: Create Release

on:
  workflow_call:
    inputs:
      version:
        description: 'Version number (e.g., v1.0.0). Leave blank to use the latest version from CHANGELOG.md.'
        required: false
        type: string

permissions:
  contents: write

jobs:
  create-release:
    runs-on: ubuntu-latest

    steps:
      # Checkout
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 2

      # Load ignore list
      - name: Load ignore list
        id: ignore
        run: |
          IGNORE_FILES=$(cat .github/config/ignoreFiles.json | jq -r '.[]')
          echo "ignore<<EOF" >> $GITHUB_OUTPUT
          echo "$IGNORE_FILES" >> $GITHUB_OUTPUT
          echo "EOF" >> $GITHUB_OUTPUT

      # Classify change
      - name: Classify change
        id: classify
        run: |
          CHANGED=$(git diff --name-only HEAD~1 HEAD)
          TYPE="ignored"

          for file in $CHANGED; do
            if [[ "$(basename "$file")" == "Icon.png" ]]; then
              TYPE="icon"
              break
            fi

            if ! grep -qx "$file" <<< "${{ steps.ignore.outputs.ignore }}"; then
              TYPE="normal"
            fi
          done

          echo "type=$TYPE" >> $GITHUB_OUTPUT

      # Check if CHANGELOG changed
      - name: Check if CHANGELOG changed
        id: changelog
        run: |
          if git diff --name-only HEAD~1 HEAD | grep -q "CHANGELOG.md"; then
            echo "changed=true" >> $GITHUB_OUTPUT
          else
            echo "changed=false" >> $GITHUB_OUTPUT
          fi

      # Determine Version
      - name: Determine Version
        if: steps.classify.outputs.type != 'ignored'
        run: |
          LATEST=$(git describe --tags --abbrev=0 2>/dev/null || echo "v0.0.0")

          MAJOR=$(echo $LATEST | cut -d. -f1 | tr -d 'v')
          MINOR=$(echo $LATEST | cut -d. -f2)
          PATCH=$(echo $LATEST | cut -d. -f3)

          if [ "${{ steps.classify.outputs.type }}" == "icon" ]; then
            PATCH=$((PATCH + 1))
            VERSION="v$MAJOR.$MINOR.$PATCH"

          elif [ -n "${{ inputs.version }}" ]; then
            VERSION="${{ inputs.version }}"

          elif [ "${{ steps.changelog.outputs.changed }}" == "true" ]; then
            VERSION=$(grep -oP '^## \[\K[^]]+' CHANGELOG.md | head -n 1)
            if [ -z "$VERSION" ]; then
              echo "No versions found in CHANGELOG.md."
              exit 1
            fi
          else
            PATCH=$((PATCH + 1))
            VERSION="v$MAJOR.$MINOR.$PATCH"
          fi

          [[ "$VERSION" != v* ]] && VERSION="v$VERSION"

          echo "VERSION=$VERSION" >> $GITHUB_ENV
          echo "VERSION_NO_V=${VERSION#v}" >> $GITHUB_ENV

      # Release Notes
      - name: Extract Release Notes
        run: |
          if [ "${{ steps.classify.outputs.type }}" == "icon" ]; then
            echo "Updated connector icon." > release_notes.txt

          elif [ "${{ steps.classify.outputs.type }}" == "normal" ] && [ "${{ steps.changelog.outputs.changed }}" == "true" ] && [ -z "${{ inputs.version }}" ]; then
            awk '/## \['"${VERSION_NO_V}"'\]/{flag=1; next} /## \[/{flag=0} flag' CHANGELOG.md > release_notes.txt
            if [ ! -s release_notes.txt ]; then
              echo "No release notes found for version ${VERSION_NO_V}."
              exit 1
            fi

          elif [ -n "${{ inputs.version }}" ]; then
            echo "Release notes not provided for version ${VERSION}." > release_notes.txt

          else
            echo "Auto-generated release for ${VERSION}" > release_notes.txt
          fi

      # Create Release
      - name: Create GitHub Release
        if: steps.classify.outputs.type != 'ignored'
        run: |
          gh release create "${VERSION}" \
            --title "${VERSION}" \
            --notes-file release_notes.txt
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
