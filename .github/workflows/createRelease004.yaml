##############################
# Workflow: Create Release
# Version:  0.0.4
##############################
name: Create Release

on:
  workflow_call:
    inputs:
      version:
        description: 'Version number (e.g., v1.0.0). Leave blank to use the latest version from CHANGELOG.md.'
        required: false
        type: string

permissions:
  contents: write

jobs:
  create-release:
    runs-on: ubuntu-latest

    steps:
      # Checkout the target repository (repo calling this workflow)
      - name: Checkout repository
        uses: actions/checkout@v4

      # Checkout central workflows/config repo
      - name: Checkout central config
        uses: actions/checkout@v4
        with:
          repository: Tools4everBV/.github
          ref: main
          path: central   # <-- local folder on runner; can be any name

      # Guard: skip release if PR only contains ignored files
      - name: Skip if only ignored files changed
        if: ${{ github.event.pull_request != null }}
        uses: actions/github-script@v7
        with:
          script: |
            const fetch = require('node-fetch');

            const owner = 'Tools4everBV';
            const repo = '.github';
            const path = 'config/ignoreFiles.json';
            const ref = 'main';

            let ignoreList = [];

            try {
              const url = `https://raw.githubusercontent.com/${owner}/${repo}/${ref}/${path}`;
              const res = await fetch(url);
              if (!res.ok) throw new Error(`HTTP ${res.status}`);
              ignoreList = await res.json();
            } catch (err) {
              core.notice(`Could not fetch ignore list from central repo: ${err}. Skipping file-based guard.`);
            }

            // If ignore list is empty, do not skip
            if (ignoreList.length === 0) return;

            // Get changed files from PR
            const files = await github.paginate(
              github.rest.pulls.listFiles,
              {
                owner: context.repo.owner,
                repo: context.repo.repo,
                pull_number: context.payload.pull_request.number
              }
            );

            const changed = files.map(f => f.filename);

            const onlyIgnored =
              changed.length > 0 &&
              changed.every(f => ignoreList.includes(f));

            if (onlyIgnored) {
              core.notice("Only ignored files changed. Skipping release creation.");
              process.exit(0);
            }

      # Extract release notes from CHANGELOG.md
      - name: Extract Release Notes from CHANGELOG.md
        if: ${{ inputs.version == '' }}
        run: |
          awk '/## \['"${VERSION_NO_V}"'\]/{flag=1; next} /## \[/{flag=0} flag' CHANGELOG.md > release_notes.txt

          if [ ! -s release_notes.txt ]; then
            echo "No release notes found for version ${VERSION_NO_V}."
            exit 1
          fi

      # Default release notes if version was manually provided
      - name: Default Release Notes
        if: ${{ inputs.version != '' }}
        run: |
          echo "Release notes not provided for version ${VERSION}." > release_notes.txt

      # Create GitHub release
      - name: Create GitHub Release
        run: |
          gh release create "${VERSION}" \
            --title "${VERSION}" \
            --notes-file release_notes.txt
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
