##############################
# Workflow: Create Release
# Version:  0.0.4
##############################
name: Create Release

on:
  workflow_call:
    inputs:
      version:
        description: 'Version number (e.g., v1.0.0). Leave blank to use the latest version from CHANGELOG.md.'
        required: false
        type: string

permissions:
  contents: write

jobs:
  create-release:
    runs-on: ubuntu-latest

    steps:
      # Checkout the target repository (repo calling this workflow)
      - name: Checkout repository
        uses: actions/checkout@v4

      # Checkout central workflows/config repo
      - name: Checkout central config
        uses: actions/checkout@v4
        with:
          repository: Tools4everBV/.github
          ref: main
          path: central   # <-- local folder on runner; can be any name

      # Guard: skip release if PR only contains ignored files
      - name: Skip if only ignored files changed
        if: ${{ github.event.pull_request != null }}
        uses: actions/github-script@v7
        with:
          script: |
            const fs = require('fs');

            // read ignore list from central repo
            const ignoreList = JSON.parse(
              fs.readFileSync('central/config/ignoreFiles.json', 'utf8')
            );

            // get changed files from PR
            const files = await github.paginate(
              github.rest.pulls.listFiles,
              {
                owner: context.repo.owner,
                repo: context.repo.repo,
                pull_number: context.payload.pull_request.number
              }
            );

            const changed = files.map(f => f.filename);

            const onlyIgnored =
              changed.length > 0 &&
              changed.every(f => ignoreList.includes(f));

            if (onlyIgnored) {
              core.notice("Only ignored files changed. Skipping release creation.");
              process.exit(0);
            }

      # Determine version to release
      - name: Determine Version
        run: |
          if [ -n "${{ inputs.version }}" ]; then
            VERSION="${{ inputs.version }}"
          else
            if [ -f CHANGELOG.md ]; then
              VERSION=$(grep -oP '^## \[\K[^]]+' CHANGELOG.md | head -n 1)
              if [ -z "$VERSION" ]; then
                echo "No versions found in CHANGELOG.md."
                exit 1
              fi
            else
              echo "CHANGELOG.md not found. Cannot determine version."
              exit 1
            fi
          fi

          [[ "$VERSION" != v* ]] && VERSION="v$VERSION"

          echo "VERSION=$VERSION" >> $GITHUB_ENV
          echo "VERSION_NO_V=${VERSION#v}" >> $GITHUB_ENV

      # Extract release notes from CHANGELOG.md
      - name: Extract Release Notes from CHANGELOG.md
        if: ${{ inputs.version == '' }}
        run: |
          awk '/## \['"${VERSION_NO_V}"'\]/{flag=1; next} /## \[/{flag=0} flag' CHANGELOG.md > release_notes.txt

          if [ ! -s release_notes.txt ]; then
            echo "No release notes found for version ${VERSION_NO_V}."
            exit 1
          fi

      # Default release notes if version was manually provided
      - name: Default Release Notes
        if: ${{ inputs.version != '' }}
        run: |
          echo "Release notes not provided for version ${VERSION}." > release_notes.txt

      # Create GitHub release
      - name: Create GitHub Release
        run: |
          gh release create "${VERSION}" \
            --title "${VERSION}" \
            --notes-file release_notes.txt
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
